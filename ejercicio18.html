<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manipulación del DOM</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/ejercicio18.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Header -->
  <header class="bg-primary text-white py-3 mb-4 shadow-sm">
    <div class="container text-center">
      <h1 class="h3 mb-1"><i class="bi bi-code-slash me-2"></i>Ejercicio 18: Manipulación del DOM</h1>
      <p class="mb-0 small">Aplicación web que permite agregar y eliminar elementos de una lista dinámica usando JavaScript y Bootstrap.</p>
    </div>
  </header>

  <!-- Main -->
  <main class="container flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">

            <!-- Título -->
            <h2 class="h5 text-center text-secondary mb-4">
              <i class="bi bi-list-check me-2"></i>Agregar y Eliminar Elementos
            </h2>

            <!-- Input y botón -->
            <div class="input-group mb-3">
              <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">
              <button id="agregarBtn" class="btn btn-success">
                <i class="bi bi-plus-lg me-1"></i> Agregar
              </button>
            </div>

            <!-- Lista -->
            <ul id="lista" class="list-group">
              <!-- Los elementos se agregan dinámicamente -->
            </ul>

          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
      <small>&copy; 2026 Ejercicio 18 · Bootstrap + JavaScript DOM</small>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script original -->
  <script src="js/ejercicio18.js"></script>
</body>
</html>
